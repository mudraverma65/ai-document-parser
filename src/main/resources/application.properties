spring.application.name=docqa

# ---- Server ----
server.port=${PORT:8080}

# ---- Upload limits (tune for Render's memory tier) ----
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2MB

# ---- OpenAI ----
openai.api-key=${OPENAI_API_KEY:}
openai.chat-model=gpt-4o-mini
openai.embedding-model=text-embedding-3-small

# ---- Postgres / pgvector (Render managed Postgres) ----
pgvector.host=${PGVECTOR_HOST:localhost}
pgvector.port=${PGVECTOR_PORT:5432}
pgvector.database=${PGVECTOR_DB:docqa}
pgvector.user=${PGVECTOR_USER:postgres}
pgvector.password=${PGVECTOR_PASSWORD:postgres}
pgvector.table=document_embeddings
# text-embedding-004 = 768 dims. If you switch embedding models, update this to
# match and re-create the table/data.
pgvector.dimension=768

# ---- App-level limits ----
app.max-chunk-size=800
app.max-chunk-overlap=100
app.max-retrieved-segments=8
app.min-similarity-score=0.5
app.max-memory-messages=20

# ---- Logging ----
logging.level.dev.langchain4j=DEBUG
logging.level.com.example.docqa=DEBUG